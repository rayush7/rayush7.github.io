<!DOCTYPE html>

<head>
    {% include head.html %}
</head>
<body>
    {% include nav.html %}
    <!-- Header -->
    <header class="header flex" role="banner">
    	<link rel="stylesheet" href="https://cdn.rawgit.com/jpswalsh/academicons/master/css/academicons.min.css">
        <div class="container animated fadeIn">
            <div class="row">
                    <a href="{{ site.url }}">
                        <img src="{{ site.logo }}" class="img-circle zoombtn animated rotateIn">
                    </a>
                    <h3 class="title">
                        <a class="zoombtn" href="{{ site.url }}">
                        	<p style="font-size:1.2rem;font-weight:300">{{ site.title }}</p>
			            </a>
                    </h3>
                    <hr class="hr-line">
                    <h3 class="title">
                        <a href="{{ site.url }}">
                        	<p style="font-size:1rem;font-weight:300">{{ site.bio }}</p>
			            </a>
                    </h3>
                    {% include social-links.html %}
                  <hr class="hr-line">
                  <h3 class="title">
                         <a class="btn zoombtn" href="{{ site.url }}/about">
                         About
                         </a>
                         <!--<a class="btn zoombtn" href="{{ site.url }}/posts">
                         Posts
                         </a> -->
                         <a class="btn zoombtn" href="{{ site.url }}/publications">
                         Publications
                         </a>
                         <!--<a class="btn zoombtn" href="https://rayush7.github.io/mycv/">
                         Resume
                         </a>-->
                 </h3>
            </div>
        </div>
    </header>
    {% include scripts.html %}

    <table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin-right:auto;margin-left:auto;">
        <tr>
          <td style="padding:2.5%;width:100%;vertical-align:middle">
            <heading>News</heading>
            <p></p>
            <div class="listbox">
              <ul>
                <li> One paper accepted at <a href="https://wacv2023.thecvf.com/">WACV 2023</a>.
                    <li> One paper accepted at <a href="https://imvipconference.github.io/">IMVIP 2022</a>.
                </ul>
            </div>
          </td>
        </tr>
      </table>
</body>
</html>
